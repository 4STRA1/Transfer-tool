<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>画像変換ツール</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</head>

<body>

<div class="container">

  <h1>画像変換ツール</h1>

  <!-- ドロップエリア -->
  <label
    class="drop-area"
    id="dropArea"
  >

    <input
      type="file"
      id="fileInput"
      multiple
      webkitdirectory
      directory
      accept="image/*,.pdf"
      hidden
    >

    <div class="drop-content">

      <div class="drop-icon">
        📁
      </div>

      <div class="drop-text">
        ファイル / フォルダを追加
      </div>

      <div class="drop-sub">
        ドラッグ＆ドロップ対応
      </div>

    </div>

  </label>

  <!-- 保存先 -->
  <div class="save-location">

    <button
      class="folder-btn"
      id="selectFolderBtn"
    >
      保存先フォルダを選択
    </button>

    <div
      class="save-path"
      id="savePath"
    >
      保存先: 未選択
    </div>

  </div>

  <!-- コントロール -->
  <div class="controls">

    <select id="formatSelect">

      <option value="png">
        PNG
      </option>

      <option value="jpeg">
        JPEG
      </option>

      <option value="webp">
        WEBP
      </option>

      <option value="pdf">
        PDF
      </option>

    </select>

    <button id="convertBtn">
      変換開始
    </button>

  </div>

  <!-- プレビュー -->
  <div id="previewGrid"></div>

  <!-- 進行バー -->
  <div class="progress-wrapper">

    <div
      class="progress-bar"
      id="progressBar"
    ></div>

  </div>

  <!-- 状態 -->
  <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>

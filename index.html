<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>画像変換ツール</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</head>

<body>

<div class="container">

<h1>画像変換ツール</h1>

<!-- アップロード -->
<label class="drop-area" id="dropArea">

<input type="file" id="fileInput" multiple accept="image/*,.pdf" hidden>

<div class="drop-content">
<div class="drop-icon">📁</div>
<div class="drop-text">ファイルを追加</div>
<div class="drop-sub">複数選択対応</div>
</div>

</label>

<!-- 設定 -->
<div class="controls">

<select id="formatSelect">
<option value="png">PNG</option>
<option value="jpeg">JPEG</option>
<option value="webp">WEBP</option>
<option value="pdf">PDF</option>
</select>

<button id="convertBtn">変換開始</button>

</div>

<!-- プレビュー -->
<div id="previewGrid"></div>

<!-- 進行 -->
<div class="progress-wrapper">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="status"></div>

</div>

<!-- 結果画面 -->
<div id="resultPanel" class="result-panel hidden">

<h2>変換結果</h2>

<div id="resultList"></div>

<button id="downloadAllBtn">全てダウンロード</button>
<button id="backBtn" disabled>元の画面に戻る</button>

</div>

<script src="script.js"></script>

</body>
</html>
